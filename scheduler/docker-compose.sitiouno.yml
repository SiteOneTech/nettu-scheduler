services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nettu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nettu_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-nettuscheduler}
    volumes:
      - nettu_postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nettu} -d ${POSTGRES_DB:-nettuscheduler}"]
      interval: 10s
      timeout: 5s
      retries: 10

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        DATABASE_URL: postgresql://${POSTGRES_USER:-nettu}:${POSTGRES_PASSWORD:-nettu_dev_password}@127.0.0.1:${POSTGRES_HOST_PORT:-55432}/${POSTGRES_DB:-nettuscheduler}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nettu}:${POSTGRES_PASSWORD:-nettu_dev_password}@postgres:5432/${POSTGRES_DB:-nettuscheduler}
      ACCOUNT_API_KEY: ${ACCOUNT_API_KEY:?ACCOUNT_API_KEY is required}
      ACCOUNT_ID: ${ACCOUNT_ID:-sitiouno-default}
      PORT: ${PORT:-5000}
      RUST_LOG: ${RUST_LOG:-info}
      MIGRATE_ON_START: ${MIGRATE_ON_START:-false}
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-5055}:${PORT:-5000}"

volumes:
  nettu_postgres_data:
