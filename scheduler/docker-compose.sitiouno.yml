services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        # SQLx validates queries at compile time. During local builds, connect
        # through the host-bound Agent Core Postgres port.
        DATABASE_URL: postgresql://${AGENT_DB_ADMIN_USER:-agent_admin}:${AGENT_DB_ADMIN_PASSWORD:?AGENT_DB_ADMIN_PASSWORD is required}@127.0.0.1:${AGENT_DB_HOST_PORT:-55430}/${AGENT_CALENDAR_DB_NAME:-nettu_calendar}
    restart: unless-stopped
    environment:
      # Runtime uses the shared Docker network and the Agent Core DB server.
      DATABASE_URL: postgresql://${AGENT_DB_ADMIN_USER:-agent_admin}:${AGENT_DB_ADMIN_PASSWORD:?AGENT_DB_ADMIN_PASSWORD is required}@agent-postgres:5432/${AGENT_CALENDAR_DB_NAME:-nettu_calendar}
      ACCOUNT_API_KEY: ${ACCOUNT_API_KEY:?ACCOUNT_API_KEY is required}
      ACCOUNT_ID: ${ACCOUNT_ID:-zeus-calendar}
      PORT: ${PORT:-5000}
      RUST_LOG: ${RUST_LOG:-info}
      MIGRATE_ON_START: ${MIGRATE_ON_START:-false}
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-5055}:${PORT:-5000}"
    networks:
      - agent-core

networks:
  agent-core:
    external: true
    name: agent-core
