services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        # SQLx validates queries at compile time. During local builds, connect
        # through the host-bound Agent Core Postgres port with the migration role.
        DATABASE_URL: postgresql://${AGENT_DB_ADMIN_USER}:${AGENT_DB_ADMIN_PASSWORD}@127.0.0.1:${AGENT_DB_HOST_PORT:-55430}/${AGENT_CALENDAR_DB_NAME:-nettu_calendar}
    restart: unless-stopped
    environment:
      # Runtime uses the least-privilege calendar role from Infisical.
      DATABASE_URL: ${CALENDAR_DATABASE_URL_DOCKER:?CALENDAR_DATABASE_URL_DOCKER is required}
      ACCOUNT_API_KEY: ${NETTU_ACCOUNT_API_KEY:?NETTU_ACCOUNT_API_KEY is required}
      ACCOUNT_ID: ${ACCOUNT_ID:-zeus-calendar}
      PORT: ${NETTU_PORT:-5000}
      RUST_LOG: ${RUST_LOG:-info}
      MIGRATE_ON_START: ${MIGRATE_ON_START:-false}
    ports:
      - "${NETTU_HOST_BIND:-127.0.0.1}:${NETTU_HOST_PORT:-5055}:${NETTU_PORT:-5000}"
    networks:
      - agent-core

networks:
  agent-core:
    external: true
    name: agent-core
